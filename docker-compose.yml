version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: blunoro
      POSTGRES_USER: ${DB_USER:-blunoro}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - blunoro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-blunoro}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Message Queue - DOPORUČENO pro chat aplikaci
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-blunoro}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secure_password_123}
      RABBITMQ_DEFAULT_VHOST: blunoro
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - blunoro-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-secure_password_123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - blunoro-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch for logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - blunoro-network

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - blunoro-network

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - blunoro-network

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - blunoro-network

  # API Gateway (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - blunoro-api
      - blunoro-chat
    networks:
      - blunoro-network

  # BluNoro Services (budoucí mikroslužby)
  
  # Authentication Service
  blunoro-auth:
    build:
      context: .
      dockerfile: src/BluNoro.Auth/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=blunoro;Username=${DB_USER:-blunoro};Password=${DB_PASSWORD:-secure_password_123}
      - Redis__ConnectionString=redis:6379
      - JWT__SecretKey=${JWT_SECRET:-your_super_secret_jwt_key_here}
    depends_on:
      - postgres
      - redis
    networks:
      - blunoro-network

  # Chat Service  
  blunoro-chat:
    build:
      context: .
      dockerfile: src/BluNoro.Chat/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=blunoro;Username=${DB_USER:-blunoro};Password=${DB_PASSWORD:-secure_password_123}
      - RabbitMQ__ConnectionString=amqp://${RABBITMQ_USER:-blunoro}:${RABBITMQ_PASSWORD:-secure_password_123}@rabbitmq:5672/blunoro
      - Redis__ConnectionString=redis:6379
    depends_on:
      - postgres
      - rabbitmq
      - redis
      - blunoro-auth
    networks:
      - blunoro-network

  # API Gateway Service
  blunoro-api:
    build:
      context: .
      dockerfile: src/BluNoro.API/Dockerfile
    environment:
      - Services__Auth=http://blunoro-auth
      - Services__Chat=http://blunoro-chat
      - JWT__SecretKey=${JWT_SECRET:-your_super_secret_jwt_key_here}
    ports:
      - "5000:80"
    depends_on:
      - blunoro-auth
      - blunoro-chat
    networks:
      - blunoro-network

  # Notification Service
  blunoro-notifications:
    build:
      context: .
      dockerfile: src/BluNoro.Notifications/Dockerfile
    environment:
      - RabbitMQ__ConnectionString=amqp://${RABBITMQ_USER:-blunoro}:${RABBITMQ_PASSWORD:-secure_password_123}@rabbitmq:5672/blunoro
      - SMTP__Host=${SMTP_HOST}
      - SMTP__Port=${SMTP_PORT:-587}
      - SMTP__Username=${SMTP_USERNAME}
      - SMTP__Password=${SMTP_PASSWORD}
    depends_on:
      - rabbitmq
    networks:
      - blunoro-network

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  blunoro-network:
    driver: bridge